
# Configuration for USCIS Photo App

server {
    listen 7170;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Aumentar tiempos de espera para operaciones de procesamiento de imágenes
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Redireccionar todas las solicitudes a index.html para SPA
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Configuración de cache para archivos estáticos
    location /assets/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        log_not_found off;
        # Aumentar el tamaño de buffer para archivos grandes
        client_max_body_size 10M;
    }

    # Configuración para recursos estáticos específicos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000";
        log_not_found off;
    }

    # Configuración específica para JavaScript
    location ~* \.js$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Type "application/javascript; charset=utf-8";
        log_not_found off;
    }

    # Proxy para Anthropic Claude API
    location /api/anthropic/ {
        proxy_pass https://api.anthropic.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.anthropic.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Headers "Content-Type, x-api-key, anthropic-version, anthropic-dangerous-direct-browser-access";
        add_header Access-Control-Allow-Methods "POST, OPTIONS";
        if ($request_method = OPTIONS) { return 204; }
    }

    # Proxy para OpenAI DALL-E API
    location /api/openai/ {
        proxy_pass https://api.openai.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.openai.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        add_header Access-Control-Allow-Methods "POST, OPTIONS";
        if ($request_method = OPTIONS) { return 204; }
    }

    # Encabezados de seguridad
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
}
